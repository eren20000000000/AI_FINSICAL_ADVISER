<!DOCTYPE html>
<html lang="en">
<head>

  <title>Dodgy Dave's Stock Predictions</title>

</head>
<body>
  <div class="container">

      <div class="logo">
        <div class="character">🤵</div>
        <h1><span>Dodgy</span> <span>Dave's</span></h1>
      </div>

    <main>

      <div id="Result_container"  class="ticker-input">
<div id="Result">

</div>
      </div>

      <p class="tickers">Your tickers will appear here...</p>

      <button class="subscribe-btn">🔥 SUBSCRIBE</button>
    </footer>
  </div>
</body>
<script src="script.js"></script>
</html>
